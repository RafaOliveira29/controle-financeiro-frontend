<div class="flex h-screen w-full bg-slate-50 text-slate-900 font-sans antialiased overflow-hidden">
  
  <!-- Backdrop for mobile -->
  @if (layoutService.isSidebarOpen()) {
    <div class="fixed inset-0 bg-slate-900/50 z-40 md:hidden transition-opacity" (click)="layoutService.toggleSidebar()"></div>
  }

  <!-- Sidebar -->
  <div class="fixed inset-y-0 left-0 z-50 w-64 transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0"
       [ngClass]="{'translate-x-0': layoutService.isSidebarOpen(), '-translate-x-full': !layoutService.isSidebarOpen()}">
    <app-sidebar></app-sidebar>
  </div>
  
  <!-- Main Content -->
  <div class="flex flex-col flex-1 w-full overflow-hidden">
    <app-header></app-header>
    <main class="flex-1 overflow-y-auto p-4 md:p-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
